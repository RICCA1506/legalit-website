<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legalit — Accesso Riservato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060e1a;
      color: #e2e8f0;
      overflow: hidden;
      position: relative;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(10, 50, 100, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(20, 60, 120, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6, 14, 26, 1) 0%, rgba(6, 14, 26, 1) 100%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { opacity: 1; }
      50% { opacity: 0.85; }
      100% { opacity: 1; }
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(74, 144, 217, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 144, 217, 0.5) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 48px;
    }

    .logo-container img {
      height: 52px;
      width: auto;
      filter: brightness(1.1);
    }

    .card {
      background: rgba(12, 22, 40, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(74, 144, 217, 0.1);
      border-radius: 12px;
      padding: 36px 28px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .lock-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(74, 144, 217, 0.1);
      border: 1px solid rgba(74, 144, 217, 0.15);
    }

    .lock-icon svg {
      width: 18px;
      height: 18px;
      stroke: #4a90d9;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .card-subtitle {
      font-size: 13px;
      color: #64748b;
      line-height: 1.5;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .input-icon svg {
      width: 16px;
      height: 16px;
      stroke: #475569;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }

    input[type="password"] {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-radius: 8px;
      background: rgba(8, 15, 28, 0.7);
      color: #e2e8f0;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    input[type="password"]:focus {
      border-color: rgba(74, 144, 217, 0.5);
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.08);
    }

    input[type="password"]:focus ~ .input-icon svg {
      stroke: #4a90d9;
    }

    input[type="password"]::placeholder { color: #3e4a5c; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a3f6f 0%, #153360 100%);
      border: 1px solid rgba(74, 144, 217, 0.15);
      color: #d1dded;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    button[type="submit"]:hover {
      background: linear-gradient(135deg, #1f4a80 0%, #1a3f6f 100%);
      border-color: rgba(74, 144, 217, 0.25);
      color: #fff;
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-arrow {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s;
    }

    button[type="submit"]:hover .btn-arrow {
      transform: translateX(2px);
    }

    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: none;
      animation: shake 0.4s ease-in-out;
    }

    .error.visible { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.5px;
    }

    .spinner {
      display: none;
    }

    .spinner.visible {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg { animation: none; }
      .wrapper { animation: none; }
      .error { animation: none; }
      .spinner.visible { animation: spin 1.2s linear infinite; }
      button[type="submit"]:active { transform: none; }
      button[type="submit"]:hover .btn-arrow { transform: none; }
    }

    @media (max-width: 480px) {
      .wrapper { padding: 16px; }
      .card { padding: 28px 20px; }
      .logo-container { margin-bottom: 36px; }
      .logo-container img { height: 44px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="wrapper">
    <div class="logo-container">
      <img src="/attached_assets/logo_legalit_cropped.png" alt="Legalit - Società tra Avvocati" />
    </div>

    <div class="card">
      <div class="card-header">
        <div class="lock-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 class="card-title">Accesso Riservato</h1>
        <p class="card-subtitle">Sito in fase di sviluppo.<br>Inserisci la password per accedere.</p>
      </div>

      <form id="gate-form">
        <div class="input-group">
          <label for="gate-password" class="sr-only">Password di accesso</label>
          <input
            type="password"
            id="gate-password"
            placeholder="Password"
            autocomplete="off"
            autofocus
            aria-describedby="gate-error"
          />
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
        </div>
        <button type="submit" id="gate-btn">
          <span id="btn-text">Accedi</span>
          <span class="spinner" id="btn-spinner" aria-hidden="true"></span>
          <svg class="btn-arrow" id="btn-arrow" viewBox="0 0 24 24" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <p class="error" id="gate-error" role="alert" aria-live="assertive">Password non corretta. Riprova.</p>
      </form>
    </div>

    <p class="footer-text">&copy; 2026 Legalit Societ&agrave; tra Avvocati S.r.l.</p>
  </div>

  <script>
    const form = document.getElementById('gate-form');
    const btn = document.getElementById('gate-btn');
    const btnText = document.getElementById('btn-text');
    const btnArrow = document.getElementById('btn-arrow');
    const btnSpinner = document.getElementById('btn-spinner');
    const errEl = document.getElementById('gate-error');
    const pwInput = document.getElementById('gate-password');

    function setLoading(loading) {
      btn.disabled = loading;
      btnArrow.style.display = loading ? 'none' : '';
      if (loading) {
        btnSpinner.classList.add('visible');
        btnText.textContent = 'Verifica...';
      } else {
        btnSpinner.classList.remove('visible');
        btnText.textContent = 'Accedi';
      }
    }

    function showError() {
      errEl.classList.remove('visible');
      void errEl.offsetWidth;
      errEl.classList.add('visible');
      pwInput.value = '';
      pwInput.focus();
      setLoading(false);
    }

    pwInput.addEventListener('input', () => {
      errEl.classList.remove('visible');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = pwInput.value;
      if (!pw) return;

      errEl.classList.remove('visible');
      setLoading(true);

      try {
        const res = await fetch('/api/site-access', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          btnText.textContent = 'Accesso consentito';
          setTimeout(() => window.location.reload(), 300);
        } else {
          showError();
        }
      } catch {
        showError();
      }
    });
  </script>
</body>
</html>
