<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legalit - Brand Loader</title>
    <style>
        /* --- 1. CONFIGURAZIONE COLORI --- */
        :root {
            --loader-bg: #ffffff;    /* Sfondo del loader */
            --grey-outer: #76777B;
            --grey-dark: #636466;    /* Metà Sinistra */
            --grey-light: #8A8B8E;   /* Metà Destra */
            --blue-apex: #003B71;
            
            /* Durata Animazione */
            --anim-duration: 2.0s;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            /* Contenuto finto del sito */
            background-color: #f4f4f4;
        }

        /* --- 2. CONTENITORE LOADER (Copre tutto lo schermo) --- */
        #site-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--loader-bg);
            z-index: 99999; /* Sopra a tutto */
            
            /* Flexbox per centrare il logo */
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Transizione per la scomparsa finale */
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        /* Classe per nascondere il loader */
        #site-loader.loader-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Dimensione Logo nel Loader */
        .loader-logo-wrapper {
            width: 200px;  /* Più piccolo ed elegante per un loader */
            height: 200px;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* --- 3. ANIMAZIONE CSS --- */
        
        /* Definizione del movimento "disegno" */
        @keyframes drawLine {
            from { stroke-dashoffset: var(--path-length); }
            to   { stroke-dashoffset: 0; }
        }

        /* Definizione del riempimento colore */
        @keyframes fillIn {
            from { fill-opacity: 0; }
            to   { fill-opacity: 1; }
        }

        svg path {
            stroke-width: 24px; /* Spessore */
            
            /* Impostiamo il dasharray per permettere l'animazione */
            stroke-dasharray: var(--path-length);
            stroke-dashoffset: var(--path-length); /* Inizia nascosto */
            
            fill-opacity: 0; /* Riempimento inizia nascosto */
            
            /* APPLICAZIONE ANIMAZIONI:
               1. drawLine: dura 2s, ease-in-out, mantiene lo stato finale (forwards)
               2. fillIn: dura 0.5s, parte dopo 1.5s (quando il disegno è quasi finito)
            */
            animation: 
                drawLine var(--anim-duration) ease-in-out forwards,
                fillIn 0.5s ease-out 1.5s forwards;
        }

        /* --- 4. STILI SPECIFICI (GEOMETRIA CLIP PATH) --- */
        
        /* ESTERNI */
        .part-outer-grey, .part-outer-blue {
            stroke-linecap: butt; 
            stroke-linejoin: miter;
            stroke-miterlimit: 10;
        }

        /* CENTRALI + CLIPPING */
        .part-center-left, .part-center-right {
            stroke-linecap: round; 
            stroke-linejoin: miter; 
            stroke-miterlimit: 10;
        }
        
        .part-center-left { clip-path: url(#clip-left-half); }
        .part-center-right { clip-path: url(#clip-right-half); }

        /* COLORI */
        .part-outer-grey { stroke: var(--grey-outer); fill: var(--grey-outer); }
        .part-center-left { stroke: var(--grey-dark); fill: var(--grey-dark); }
        .part-center-right { stroke: var(--grey-light); fill: var(--grey-light); }
        .part-outer-blue { stroke: var(--blue-apex); fill: var(--blue-apex); }

    </style>
</head>
<body>

    <div id="site-loader">
        <div class="loader-logo-wrapper">
            <svg viewBox="0 0 1470 1470" preserveAspectRatio="xMidYMid meet">
                
                <defs>
                    <clipPath id="clip-left-half">
                        <rect x="0" y="0" width="735" height="1470" />
                    </clipPath>
                    <clipPath id="clip-right-half">
                        <rect x="735" y="0" width="735" height="1470" />
                    </clipPath>
                </defs>

                <g transform="translate(0, 1470) scale(1, -1)">
                    <path class="draw-me part-outer-grey" d="M441 1123 l-282 -287 90 -90 91 -91 198 198 197 197 142 -142 142 -142 31 29 c16 16 30 33 30 39 0 6 -78 88 -172 183 l-173 173 -197 -197 -198 -198 -22 22 -22 22 217 218 217 218 310 -310 310 -309 35 34 35 34 -342 343 c-189 189 -345 343 -349 343 -3 0 -132 -129 -288 -287z"/>
                    
                    <path class="draw-me part-center-left" d="M735 935 L535 735 L735 535"/>

                    <path class="draw-me part-center-right" d="M735 935 L935 735 L735 535"/>
                    
                    <path class="draw-me part-outer-blue" d="M82 767 c-18 -18 -32 -37 -32 -43 0 -5 153 -162 340 -349 l340 -340 290 290 290 290 -87 87 c-48 49 -92 88 -98 88 -5 0 -96 -87 -202 -192 l-193 -193 -143 143 -143 142 -34 -35 -34 -35 40 -42 c21 -23 101 -105 176 -182 l137 -141 199 198 198 198 19 -21 c19 -21 18 -22 -195 -235 l-215 -215 -310 310 -311 310 -32 -33z"/>
                </g>
            </svg>
        </div>
    </div>

    <div style="padding: 50px; text-align: center;">
        <h1>Benvenuto in Legalit</h1>
        <p>Il contenuto del sito è qui sotto...</p>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </div>

    <script>
        // 1. INIZIALIZZAZIONE SVG (Misura linee)
        // Eseguiamo questo subito per preparare l'animazione CSS
        const paths = document.querySelectorAll('.draw-me');
        paths.forEach(path => {
            const length = path.getTotalLength();
            path.style.setProperty('--path-length', length);
        });

        // 2. GESTIONE CARICAMENTO PAGINA
        window.addEventListener("load", () => {
            const loader = document.getElementById("site-loader");
            
            // Opzionale: ritardo minimo per assicurarsi che l'animazione si veda
            // Se vuoi che sparisca IMMEDIATAMENTE appena pronto, metti 0
            const minimumShowTime = 2000; // aspetta almeno 2 secondi (durata animazione)

            setTimeout(() => {
                // Aggiunge la classe che fa sfumare l'opacità a 0
                loader.classList.add("loader-hidden");

                // Rimuove fisicamente il div dal DOM dopo la transizione (0.5s)
                loader.addEventListener("transitionend", () => {
                    loader.remove();
                });
            }, minimumShowTime);
        });
    </script>
</body>
</html>
