<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Legalit Intro Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Bottone per far partire l'esperienza */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); z-index: 10; cursor: pointer;
            color: white; font-size: 24px; text-transform: uppercase;
        }

        /* Stili Logo SVG */
        #logo-container {
            width: 600px; height: 600px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; visibility: hidden; /* Nascosto finché non parte */
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        :root {
            --grey-outer: #76777B; --grey-dark: #636466;
            --grey-light: #8A8B8E; --blue-apex: #003B71;
            --anim-duration: 2.0s;
        }

        @keyframes drawLine {
            from { stroke-dashoffset: var(--path-length); }
            to   { stroke-dashoffset: 0; }
        }
        @keyframes fillIn {
            from { fill-opacity: 0; }
            to   { fill-opacity: 1; }
        }

        svg path {
            stroke-width: 20px;
            stroke-dasharray: var(--path-length);
            stroke-dashoffset: var(--path-length);
            fill-opacity: 0;
        }

        .animate-svg {
            animation: 
                drawLine var(--anim-duration) ease-in-out forwards,
                fillIn 0.5s ease-out 1.5s forwards;
        }

        .part-outer-grey { stroke: var(--grey-outer); fill: var(--grey-outer); }
        .part-center-left { stroke: var(--grey-dark); fill: var(--grey-dark); clip-path: url(#clip-l); }
        .part-center-right { stroke: var(--grey-light); fill: var(--grey-light); clip-path: url(#clip-r); }
        .part-outer-blue { stroke: var(--blue-apex); fill: var(--blue-apex); }
    </style>
</head>
<body>

<div id="overlay">Clicca per avviare l'esperienza</div>

<video id="office-video" muted playsinline style="display:none">
    <source src="video1.mp4" type="video/mp4">
</video>

<div id="dom-target">
    <div id="logo-container">
        <svg viewBox="0 0 1470 1470">
            <defs>
                <clipPath id="clip-l"><rect x="0" y="0" width="735" height="1470" /></clipPath>
                <clipPath id="clip-r"><rect x="735" y="0" width="735" height="1470" /></clipPath>
            </defs>
            <g transform="translate(0, 1470) scale(1, -1)">
                <path class="draw-me part-outer-grey" d="M441 1123 l-282 -287 90 -90 91 -91 198 198 197 197 142 -142 142 -142 31 29 c16 16 30 33 30 39 0 6 -78 88 -172 183 l-173 173 -197 -197 -198 -198 -22 22 -22 22 217 218 217 218 310 -310 310 -309 35 34 35 34 -342 343 c-189 189 -345 343 -349 343 -3 0 -132 -129 -288 -287z"/>
                <path class="draw-me part-center-left" d="M735 935 L535 735 L735 535"/>
                <path class="draw-me part-center-right" d="M735 935 L935 735 L735 535"/>
                <path class="draw-me part-outer-blue" d="M82 767 c-18 -18 -32 -37 -32 -43 0 -5 153 -162 340 -349 l340 -340 290 290 290 290 -87 87 c-48 49 -92 88 -98 88 -5 0 -96 -87 -202 -192 l-193 -193 -143 143 -143 142 -34 -35 -34 -35 40 -42 c21 -23 101 -105 176 -182 l137 -141 199 198 198 198 19 -21 c19 -21 18 -22 -195 -235 l-215 -215 -310 310 -311 310 -32 -33z"/>
            </g>
        </svg>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

    let scene, camera, renderer, cssRenderer, videoTexture, logoObject;
    const video = document.getElementById('office-video');
    const overlay = document.getElementById('overlay');
    const logoContainer = document.getElementById('logo-container');

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        cssRenderer = new CSS3DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.domElement.style.position = 'absolute';
        cssRenderer.domElement.style.top = 0;
        document.body.appendChild(cssRenderer.domElement);

        videoTexture = new THREE.VideoTexture(video);
        const bgMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(24, 13.5), 
            new THREE.MeshBasicMaterial({ map: videoTexture })
        );
        bgMesh.position.z = -5;
        scene.add(bgMesh);

        // Inizializzazione percorsi SVG
        const paths = document.querySelectorAll('.draw-me');
        paths.forEach(p => p.style.setProperty('--path-length', p.getTotalLength()));

        logoObject = new CSS3DObject(logoContainer);
        logoObject.position.set(0, 0.8, 2); // Posizione iniziale sopra la sedia
        logoObject.scale.set(0.003, 0.003, 0.003);
        scene.add(logoObject);

        overlay.addEventListener('click', startExperience);
        window.addEventListener('resize', onWindowResize);
        
        animate();
    }

    function startExperience() {
        overlay.style.display = 'none';
        logoContainer.style.visibility = 'visible';
        
        // Avvia animazione SVG
        document.querySelectorAll('.draw-me').forEach(p => p.classList.add('animate-svg'));
        
        video.play();
    }

    function animate() {
        requestAnimationFrame(animate);

        if (!video.paused) {
            const t = video.currentTime;
            const duration = video.duration || 4; 
            const progress = t / duration;

            // Tracking dinamico: il logo si ingrandisce e scende leggermente
            // per simulare l'avvicinamento della camera del video alla scrivania
            const scale = 0.003 + (progress * 0.004); 
            logoObject.scale.set(scale, scale, scale);
            
            // Regola questo valore per far combaciare il logo alla sedia
            logoObject.position.y = 0.8 - (progress * 0.5); 
            logoObject.position.z = 2 + (progress * 1.5);
        }

        renderer.render(scene, camera);
        cssRenderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>
</body>
</html>
