<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Logo - FINAL CLIPPED (Taglio Perfetto)</title>
    <style>
        /* --- 1. IMPOSTAZIONI --- */
        :root {
            --logo-size: 600px; 
            
            /* Colori */
            --grey-outer: #76777B;
            --grey-dark: #636466;    /* Metà Sinistra */
            --grey-light: #8A8B8E;   /* Metà Destra */
            --blue-apex: #003B71;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 300vh;
            font-family: sans-serif;
            background-color: #f4f4f4;
        }

        /* --- 2. CONTENITORE --- */
        .logo-wrapper {
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            
            width: var(--logo-size);
            height: var(--logo-size);
            
            z-index: 9999; 
            pointer-events: none;
            max-width: 90vw;
            max-height: 90vh;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* --- 3. STILE LINEE BASE --- */
        svg path {
            stroke-width: 24px;
            
            /* Animazione */
            stroke-dasharray: var(--path-length);
            stroke-dashoffset: calc(var(--path-length) * (1 - var(--progress, 0)));
            
            transition: fill-opacity 0.5s ease, stroke 0.5s ease, fill 0.5s ease;
            fill-opacity: 0;
        }

        /* --- 4. STILI SPECIFICI --- */

        /* ESTERNI: Spigolosi */
        .part-outer-grey, .part-outer-blue {
            stroke-linecap: butt; 
            stroke-linejoin: miter;
            stroke-miterlimit: 10;
        }

        /* CENTRALI: Punte Arrotondate + CLIPPING */
        .part-center-left, .part-center-right {
            /* Manteniamo round per le punte esterne (alto/basso) */
            stroke-linecap: round; 
            stroke-linejoin: miter; 
            stroke-miterlimit: 10;
        }
        
        /* Applichiamo le maschere di ritaglio definite nell'SVG */
        .part-center-left {
            clip-path: url(#clip-left-half);
        }
        
        .part-center-right {
            clip-path: url(#clip-right-half);
        }


        /* --- 5. COLORI --- */
        .part-outer-grey { stroke: var(--grey-outer); fill: var(--grey-outer); }
        .part-center-left { stroke: var(--grey-dark); fill: var(--grey-dark); }
        .part-center-right { stroke: var(--grey-light); fill: var(--grey-light); }
        .part-outer-blue { stroke: var(--blue-apex); fill: var(--blue-apex); }

        /* --- 6. STATO FINALE --- */
        .logo-wrapper.filled path {
            fill-opacity: 1;
        }

        .scroll-help {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="scroll-help">Scorri: Ora il taglio centrale è forzato da maschere di ritaglio (clipping). Impossibile che si sovrappongano.</div>

    <div class="logo-wrapper" id="logoComponent">
        <svg viewBox="0 0 1470 1470" preserveAspectRatio="xMidYMid meet">
            
            <defs>
                <clipPath id="clip-left-half">
                    <rect x="0" y="0" width="735" height="1470" />
                </clipPath>
                
                <clipPath id="clip-right-half">
                    <rect x="735" y="0" width="735" height="1470" />
                </clipPath>
            </defs>

            <g transform="translate(0, 1470) scale(1, -1)">
                
                <path class="draw-me part-outer-grey" d="M441 1123 l-282 -287 90 -90 91 -91 198 198 197 197 142 -142 142 -142 31 29 c16 16 30 33 30 39 0 6 -78 88 -172 183 l-173 173 -197 -197 -198 -198 -22 22 -22 22 217 218 217 218 310 -310 310 -309 35 34 35 34 -342 343 c-189 189 -345 343 -349 343 -3 0 -132 -129 -288 -287z"/>
                
                <path class="draw-me part-center-left" d="M735 935 L535 735 L735 535"/>

                <path class="draw-me part-center-right" d="M735 935 L935 735 L735 535"/>
                
                <path class="draw-me part-outer-blue" d="M82 767 c-18 -18 -32 -37 -32 -43 0 -5 153 -162 340 -349 l340 -340 290 290 290 290 -87 87 c-48 49 -92 88 -98 88 -5 0 -96 -87 -202 -192 l-193 -193 -143 143 -143 142 -34 -35 -34 -35 40 -42 c21 -23 101 -105 176 -182 l137 -141 199 198 198 198 19 -21 c19 -21 18 -22 -195 -235 l-215 -215 -310 310 -311 310 -32 -33z"/>
            </g>
        </svg>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const logoWrapper = document.getElementById("logoComponent");
            const paths = document.querySelectorAll('.draw-me');

            // 1. Misura linee
            paths.forEach(path => {
                const length = path.getTotalLength();
                path.style.setProperty('--path-length', length);
            });

            // 2. Scroll
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const windowHeight = window.innerHeight;
                const scrollDistance = windowHeight * 1.5; 

                let progress = scrollY / scrollDistance;
                if (progress < 0) progress = 0;
                if (progress > 1) progress = 1;

                logoWrapper.style.setProperty("--progress", progress);

                if (progress > 0.95) {
                    logoWrapper.classList.add('filled');
                } else {
                    logoWrapper.classList.remove('filled');
                }
            });
        });
    </script>
</body>
</html>
