    </script>
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        transition: opacity 0.3s ease;
      }
      #app-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-preloader .preloader-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
        opacity: 0.9;
      }
      #app-preloader .preloader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(126,184,229,0.2);
        border-top-color: #7eb8e5;
        border-radius: 50%;
        animation: preloader-spin 0.8s linear infinite;
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-preloader">
      <img class="preloader-logo" src="/favicon.png" alt="" width="80" height="80" />
      <div class="preloader-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var rootEl = document.getElementById('root');
        var preloader = document.getElementById('app-preloader');
        if (!rootEl || !preloader) return;
        var observer = new MutationObserver(function() {
          if (rootEl.children.length > 0) {
            observer.disconnect();
            preloader.classList.add('fade-out');
            setTimeout(function() { preloader.remove(); }, 350);
          }
        });
        observer.observe(rootEl, { childList: true });
        setTimeout(function() {
          if (preloader.parentNode) {
            preloader.classList.add('fade-out');
            setTimeout(function() { preloader.remove(); }, 350);
          }
        }, 15000);
      })();
    </script>
  </body>
