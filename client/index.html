    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0a0a0a;
        transition: opacity 0.5s ease;
        overflow: hidden;
      }
      #app-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-preloader svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.18;
      }
    </style>

  <body>

      <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 800">

          <path stroke-width="1.0" d="M-50,650 Q300,580 500,660 T900,620 T1250,670 T1300,640" opacity="0.75"/>
          <path stroke-width="0.5" d="M-50,680 Q320,610 530,690 T920,650 T1250,700 T1300,670" opacity="0.35"/>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var rootEl = document.getElementById('root');
        var preloader = document.getElementById('app-preloader');
        if (!rootEl || !preloader) return;
        function fadeOut() {
          preloader.classList.add('fade-out');
          setTimeout(function() { preloader.remove(); }, 600);
        }
        var observer = new MutationObserver(function() {
          if (rootEl.children.length > 0) {
            observer.disconnect();
            setTimeout(fadeOut, 200);
          }
        });
        observer.observe(rootEl, { childList: true });
        setTimeout(function() {
          if (preloader.parentNode) fadeOut();
        }, 15000);
      })();
    </script>
