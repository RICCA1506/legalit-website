    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #FFFFFF;
        transition: opacity 0.4s ease;
        overflow: hidden;
      }
      #app-preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-preloader canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>

  <body>
    <div id="app-preloader"><canvas id="preloader-canvas"></canvas></div>
    <script>
      (function(){
        var c=document.getElementById('preloader-canvas');
        if(!c)return;
        var w=window.innerWidth,h=window.innerHeight;
        c.width=w;c.height=h;
        var gl=c.getContext('webgl');
        if(!gl)return;
        var vs='attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}';
        var fs='precision highp float;'+
          'uniform vec2 u_res;uniform vec3 u_color;uniform vec3 u_bg;'+
          'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}'+
          'vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}'+
          'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}'+
          'float snoise(vec2 v){'+
            'const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);'+
            'vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1;'+
            'i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);'+
            'vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);'+
            'vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));'+
            'vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);'+
            'm=m*m;m=m*m;'+
            'vec3 x=2.0*fract(p*C.www)-1.0;vec3 h=abs(x)-0.5;vec3 ox=floor(x+0.5);vec3 a0=x-ox;'+
            'm*=1.79284291400159-0.85373472095314*(a0*a0+h*h);'+
            'vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;'+
            'return 130.0*dot(m,g);}'+
          'float fbm(vec2 p){float v=0.0;float a=0.5;float f=1.0;'+
            'for(int i=0;i<4;i++){v+=a*snoise(p*f);a*=0.45;f*=2.0;}return v;}'+
          'float contourLine(float ht,float sp,float th){'+
            'float l=abs(fract(ht/sp+0.5)-0.5)*sp;return 1.0-smoothstep(0.0,th,l);}'+
          'void main(){'+
            'vec2 uv=gl_FragCoord.xy/u_res;'+
            'vec2 asp=vec2(u_res.x/u_res.y,1.0);vec2 p=uv*asp;'+
            'vec2 sp=p*1.6;'+
            'float ht=fbm(sp);ht+=0.2*snoise(sp*0.4);'+
            'float maj=contourLine(ht,0.15,0.008);float mn=contourLine(ht,0.05,0.004);'+
            'float tn=snoise(sp*0.25)*0.5+0.5;'+
            'vec3 dk=u_color*0.78;vec3 lt=mix(u_color,vec3(1.0),0.28);vec3 lc;'+
            'if(tn<0.4){lc=mix(dk,u_color,tn/0.4);}'+
            'else if(tn<0.7){lc=mix(u_color,lt,(tn-0.4)/0.3);}'+
            'else{lc=mix(lt,u_color,(tn-0.7)/0.3);}'+
            'float cl=min(maj*0.85+mn*0.35,1.0);float alpha=cl*0.22;'+
            'alpha*=smoothstep(0.0,0.15,uv.x)*smoothstep(0.0,0.15,1.0-uv.x);'+
            'alpha*=smoothstep(0.0,0.1,uv.y)*smoothstep(0.0,0.1,1.0-uv.y);'+
            'gl_FragColor=vec4(mix(u_bg,lc,alpha),1.0);}';
        function mkS(t,src){var s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);return s;}
        var prog=gl.createProgram();
        gl.attachShader(prog,mkS(gl.VERTEX_SHADER,vs));
        gl.attachShader(prog,mkS(gl.FRAGMENT_SHADER,fs));
        gl.linkProgram(prog);gl.useProgram(prog);
        var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
        gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
        var a=gl.getAttribLocation(prog,'a_pos');gl.enableVertexAttribArray(a);
        gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
        gl.uniform2f(gl.getUniformLocation(prog,'u_res'),w,h);
        gl.uniform3f(gl.getUniformLocation(prog,'u_color'),0.18,0.408,0.518);
        gl.uniform3f(gl.getUniformLocation(prog,'u_bg'),1.0,1.0,1.0);
        gl.viewport(0,0,w,h);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
        gl.flush();
        try{var ext=gl.getExtension('WEBGL_lose_context');if(ext)ext.loseContext();}catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var p = document.getElementById('app-preloader');
        if (p && p.parentNode) {
          p.classList.add('fade-out');
          setTimeout(function() { p.remove(); }, 450);
        }
      }, 15000);
    </script>
